<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FGOガチャ備忘録</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif;
        background-color: #f0f4f8; }
        @keyframes wobble {
            0% { transform: rotate(0deg) scale(1);
            }
            25% { transform: rotate(-8deg) scale(1.1);
            }
            50% { transform: rotate(8deg) scale(1.1);
            }
            75% { transform: rotate(-4deg) scale(1.05);
            }
            100% { transform: rotate(0deg) scale(1);
            }
        }
        @keyframes jojo {
            0% { transform: scale(0);
            opacity: 0; }
            50% { transform: scale(1.3); opacity: 1;
            }
            100% { transform: scale(1); opacity: 1;
            }
        }
        @keyframes rainbow-spin {
            0% { filter: hue-rotate(0deg);
            transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg);
            }
            100% { filter: hue-rotate(360deg); transform: scale(1) rotate(360deg);
            }
        }
        @keyframes flash {
            0%, 100% { opacity: 0;
            }
            50% { opacity: 0.8; background-color: #ffffff;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0;
            }
            to { opacity: 1;
            }
        }
        @keyframes slideUp {
            from { opacity: 0;
            transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0);
            }
        }
        .animate-wobble { animation: wobble 0.15s ease-in-out infinite;
        }
        .animate-jojo { animation: jojo 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animate-rainbow { animation: rainbow-spin 1.5s linear infinite;
        }
        .animate-flash { animation: flash 0.4s ease-in-out 2;
        }
        .animate-fade-in-group { animation: fadeIn 0.8s ease-out forwards; opacity: 0;
        }
        .animate-fade-in-item { animation: slideUp 0.5s ease-out forwards; opacity: 0;
        }
        input, textarea, select { font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const ITEM_A = { id: 'a', emoji: '🌏', name: '地球' };
        const ITEM_B = { id: 'b', emoji: '🌕', name: '金色の丸い月' };
        const ITEM_C = { id: 'c', emoji: '🐓', name: 'ヒヨコ' };
        const ITEM_D = { id: 'd', emoji: '🐣', name: '卵の殻付きのヒヨコ' };
        const ITEM_E = { id: 'e', emoji: '🌱', name: '双葉' };
        function App() {
            const [activeTab, setActiveTab] = useState('memory');
            const [records, setRecords] = useState(() => {
                const saved = localStorage.getItem('gacha_records');
                return saved ? JSON.parse(saved) : [];
            });
            const [editingId, setEditingId] = useState(null);
            const [puSaba, setPuSaba] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [countA, setCountA] = useState('');
            const [countB, setCountB] = useState('');
            const [tenjo, setTenjo] = useState('');
            const [isNoFourStarPU, setIsNoFourStarPU] = useState(false);
            const [shoukanList, setShoukanList] = useState([{ name: '', count: '', type: '星5PU' }]);
            const [bikou, setBikou] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [onlyTenjo, setOnlyTenjo] = useState(false);
            const [searchYear, setSearchYear] = useState('all');
            const totalCount = useMemo(() => {
                const numA = countA === '' ? 0 : parseInt(countA);
                const numB = countB === '' ? 0 : parseInt(countB);
                return numA + (11 * numB);
            }, [countA, countB]);
            useEffect(() => {
                localStorage.setItem('gacha_records', JSON.stringify(records));
            }, [records]);
            const handleExport = async () => {
                const dataStr = JSON.stringify(records, null, 2);
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const fileName = `FGOrecord_${dateStr}.json`;
                if ('showSaveFilePicker' in window) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: fileName,
                            types: [{ description: 'JSONファイル', accept: { 'application/json': ['.json'] } }],
                        });
                        const writable = await handle.createWritable();
                        await writable.write(dataStr);
                        await writable.close();
                        alert('保存しました！');
                    } catch (err) {
                        if (err.name !== 'AbortError') console.error(err);
                    }
                } else {
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            };
            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (confirm('現在の記録を上書きしてインポートしますか？')) {
                            setRecords(importedData);
                            alert('読み込みました！');
                        }
                    } catch (error) {
                        alert('ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const filteredRecords = useMemo(() => {
                return [...records]
                    .filter(r => {
                        const matchesSearch = r.puSaba.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                              r.shoukanList.some(s => s.name.toLowerCase().includes(searchTerm.toLowerCase())) ||
                                              (r.bikou && r.bikou.toLowerCase().includes(searchTerm.toLowerCase()));
                        const matchesTenjo = onlyTenjo ? (r.tenjo && r.tenjo > 0) : true;
                        const matchesYear = searchYear === 'all' ? true : r.date.substring(0, 4) === searchYear;
                        return matchesSearch && matchesTenjo && matchesYear;
                    })
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [records, searchTerm, onlyTenjo, searchYear]);
            const availableYears = useMemo(() => {
                const years = new Set(records.map(r => r.date.substring(0, 4)));
                years.add(new Date().getFullYear().toString());
                return Array.from(years).sort((a, b) => b - a);
            }, [records]);
            const updateShoukanSaba = (index, field, value) => {
                const newList = [...shoukanList];
                newList[index][field] = value;
                setShoukanList(newList);
            };

            const handleSaveRecord = (e) => {
                e.preventDefault();
                if (!puSaba.trim()) { alert('PU鯖名を入力してください。'); return; }
                const formattedList = shoukanList.filter(s => s.name.trim() !== '').map(s => ({
                    name: s.name, count: s.count === '' ? 1 : parseInt(s.count), type: s.type || '星5PU'
                }));
                if (editingId) {
                    setRecords(records.map(rec => rec.id === editingId ? {
                        ...rec, puSaba, date, totalCount, tenjo: tenjo ? parseInt(tenjo) : null, isNoFourStarPU, shoukanList: formattedList, bikou
                    } : rec));
                    setEditingId(null);
                    alert('記録の修正を保存しました！');
                } else {
                    setRecords([{ id: Date.now(), puSaba, date, totalCount, tenjo: tenjo ? parseInt(tenjo) : null, isNoFourStarPU, shoukanList: formattedList, bikou }, ...records]);
                    alert('新しい記録を保存しました！');
                }
                setPuSaba(''); setDate(new Date().toISOString().split('T')[0]);
                setCountA(''); setCountB(''); setTenjo(''); setIsNoFourStarPU(false); setShoukanList([{ name: '', count: '', type: '星5PU' }]); setBikou('');
            };
            const handleEditClick = (rec) => {
                setEditingId(rec.id);
                setPuSaba(rec.puSaba); setDate(rec.date); setCountA(rec.totalCount % 11); setCountB(Math.floor(rec.totalCount / 11)); setTenjo(rec.tenjo || '');
                setIsNoFourStarPU(!!rec.isNoFourStarPU);
                setShoukanList(rec.shoukanList.length > 0 ? rec.shoukanList : [{ name: '', count: '', type: '星5PU' }]); setBikou(rec.bikou || '');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDeleteRecord = (id) => {
                if (confirm('この記録を削除しますか？')) {
                    setRecords(records.filter(r => r.id !== id));
                    if (editingId === id) setEditingId(null);
                }
            };
            const handleCopyToClipboard = () => {
                if (records.length === 0) { alert('コピーするログがありません。');
                return; }
                const sortedAll = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
                const text = sortedAll.map(r => {
                    return `◼️${r.date}\n・PU：${r.puSaba}\n・合計：${r.totalCount}連\n・天井：${r.tenjo || 0}回${r.isNoFourStarPU ? ' (星4PUなし)' : ''}\n＜結果＞\n${r.shoukanList.map(s => `・${s.name} ${s.count}`).join('\n')}`
                }).join('\n\n');
                navigator.clipboard.writeText(text).then(() => { alert('履歴をコピーしました！'); });
            };

            const [statYear, setStatYear] = useState(new Date().getFullYear().toString());
            const stats = useMemo(() => {
                let count = 0;
                let pickups = 0;
                let tenjo = 0;
                let countForFourStarRate = 0;
                const monthlyData = {};
                const breakdown = { '星5PU': 0, '星5他': 0, '星4PU': 0, '特殊': 0 };

                records.forEach(r => {
                    const y = r.date.substring(0, 4);
                    const m = r.date.substring(0, 7);
                    const pickupCount = r.shoukanList.reduce((sum, item) => sum + parseInt(item.count || 0), 0);
                    const tenjoCount = parseInt(r.tenjo || 0);

                    if (statYear === 'all' || parseInt(y) === parseInt(statYear)) {
                        count += r.totalCount;
                        pickups += pickupCount;
                        tenjo += tenjoCount;
                        if (!r.isNoFourStarPU) countForFourStarRate += r.totalCount;
                        r.shoukanList.forEach(item => {
                            const type = item.type || '星5PU';
                            if (breakdown.hasOwnProperty(type)) {
                                breakdown[type] += parseInt(item.count || 0);
                            }
                        });
                        if (statYear !== 'all') {
                            if (!monthlyData[m]) monthlyData[m] = { count: 0, pickups: 0 };
                            monthlyData[m].count += r.totalCount;
                            monthlyData[m].pickups += pickupCount;
                        }
                    }
                });
                return { count, pickups, tenjo, countForFourStarRate, monthlyData, breakdown };
            }, [records, statYear]);

            const skipRef = useRef(false);
            const [simPhase, setSimPhase] = useState('idle');
            const [diamonds, setDiamonds] = useState('300');
            const [simTotalCount, setSimTotalCount] = useState(0);
            const [simFiveStarPuCount, setSimFiveStarPuCount] = useState(0);
            const [simFiveStarSurinukeCount, setSimFiveStarSurinukeCount] = useState(0);
            const [simFourStarPuCount, setSimFourStarPuCount] = useState(0);
            const [simFourStarSurinukeCount, setSimFourStarSurinukeCount] = useState(0);
            const [currentStep, setCurrentStep] = useState(0);
            const [simResults, setSimResults] = useState([]);
            const [displayState, setDisplayState] = useState('gift');
            const [giftEmoji, setGiftEmoji] = useState('🍄‍🟫');
            const [isWobbling, setIsWobbling] = useState(false);
            const [isRainbowEffect, setIsRainbowEffect] = useState(false);
            const [currentItem, setCurrentItem] = useState(null);
            const runSimulator11 = async () => {
                const currentDiamonds = parseInt(diamonds) || 0;
                if (currentDiamonds < 30) {
                    alert('💎が足りません！');
                    return;
                }
                setDiamonds((currentDiamonds - 30).toString());
                setSimPhase('animating');
                setSimResults([]); skipRef.current = false;
                let draws = [];
                for (let i = 0; i < 11; i++) {
                    const r = Math.random() * 100;
                    const randShow = Math.random();
                    let item = ITEM_E;
                    let pattern = 1;
                    if (r < 0.8) { item = ITEM_A;
                    if (randShow < 0.3) pattern = 4; else if (randShow < 0.65) pattern = 3; else pattern = 2;
                    }
                    else if (r < 1.0) { item = ITEM_B;
                    if (randShow < 0.3) pattern = 4; else if (randShow < 0.65) pattern = 3; else pattern = 2;
                    }
                    else if (r < 3.1) { item = ITEM_C;
                    pattern = randShow < 0.5 ? 2 : 3; }
                    else if (r < 4.0) { item = ITEM_D;
                    pattern = randShow < 0.5 ? 2 : 3; }
                    else { item = ITEM_E;
                    pattern = 1; }
                    draws.push({ config: { pattern }, item });
                }
                const wait = async (ms) => {
                    let elapsed = 0;
                    while(elapsed < ms) {
                        if (skipRef.current) return;
                        await new Promise(r => setTimeout(r, 50));
                        elapsed += 50;
                    }
                };
                for (let stepIndex = 0; stepIndex < 11; stepIndex++) {
                    if (skipRef.current) {
                        setIsRainbowEffect(false);
                        setIsWobbling(false);
                        const nextImportantIndex = draws.findIndex((d, idx) => idx >= stepIndex && [2, 3, 4].includes(d.config.pattern));
                        if (nextImportantIndex === -1) {
                            const remainingItems = draws.slice(stepIndex).map(d => d.item);
                            setSimResults(prev => [...prev, ...remainingItems]);
                            break;
                        } else {
                            const itemsToAdd = draws.slice(stepIndex, nextImportantIndex).map(d => d.item);
                            setSimResults(prev => [...prev, ...itemsToAdd]);
                            stepIndex = nextImportantIndex - 1;
                            skipRef.current = false;
                            continue;
                        }
                    }
                    const { config, item } = draws[stepIndex];
                    setCurrentStep(stepIndex + 1); setDisplayState('gift'); setGiftEmoji('🍄‍🟫'); setIsWobbling(false); setIsRainbowEffect(false);
                    if (config.pattern === 1) {
                        setGiftEmoji('🍄‍🟫');
                        await wait(300); if(skipRef.current) { setIsRainbowEffect(false); setIsWobbling(false); setSimResults(prev => [...prev, item]); continue;
                        }
                        setIsWobbling(true);
                        await wait(800);
                    } else if (config.pattern === 2) {
                        setGiftEmoji('🍄‍🟫');
                        await wait(300); if(skipRef.current) { setIsRainbowEffect(false); setIsWobbling(false); setSimResults(prev => [...prev, item]); continue;
                        }
                        setIsWobbling(true);
                        await wait(800); if(skipRef.current) { setIsRainbowEffect(false); setIsWobbling(false); setSimResults(prev => [...prev, item]); continue;
                        }
                        setIsWobbling(false);
                        await wait(1000);
                    } else if (config.pattern === 3) {
                        setGiftEmoji('🍆');
                        await wait(300); if(skipRef.current) { setIsRainbowEffect(false); setIsWobbling(false); setSimResults(prev => [...prev, item]); continue;
                        }
                        setIsWobbling(true);
                        await wait(800); if(skipRef.current) { setIsRainbowEffect(false); setIsWobbling(false); setSimResults(prev => [...prev, item]); continue;
                        }
                        setIsWobbling(false);
                        await wait(1000);
                    } else if (config.pattern === 4) {
                        setGiftEmoji('🌑');
                        setIsRainbowEffect(true);
                        await wait(1500); if(skipRef.current) { setIsRainbowEffect(false); setIsWobbling(false); setSimResults(prev => [...prev, item]); continue;
                        }
                        setIsRainbowEffect(false);
                    }
                    if(skipRef.current) { setIsRainbowEffect(false);
                    setIsWobbling(false); setSimResults(prev => [...prev, item]); continue; }
                    setIsWobbling(false);
                    await wait(300);
                    if(skipRef.current) { setIsRainbowEffect(false); setSimResults(prev => [...prev, item]); continue;
                    }
                    setDisplayState('item');
                    setCurrentItem(item); setSimResults(prev => [...prev, item]);
                    await wait(500);
                }
                setIsRainbowEffect(false);
                setIsWobbling(false);
                setSimPhase('result');
                setSimTotalCount(prev => prev + 11);
                let fiveStarPu = 0; let fiveStarSurinuke = 0; let fourStarPu = 0;
                let fourStarSurinuke = 0;
                draws.forEach(d => {
                    if (d.item.id === 'a') fiveStarPu++;
                    if (d.item.id === 'b') fiveStarSurinuke++;
                    if (d.item.id === 'c') fourStarPu++;
                    if (d.item.id === 'd') fourStarSurinuke++;
                });
                setSimFiveStarPuCount(prev => prev + fiveStarPu);
                setSimFiveStarSurinukeCount(prev => prev + fiveStarSurinuke);
                setSimFourStarPuCount(prev => prev + fourStarPu);
                setSimFourStarSurinukeCount(prev => prev + fourStarSurinuke);
            };

            return (
                <div className="min-h-screen flex flex-col max-w-4xl mx-auto p-4 md:py-8">
                    <header className="bg-white rounded-2xl p-5 shadow-sm mb-4 border border-blue-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <h1 className="text-xl font-bold text-slate-900">FGOガチャ備忘録</h1>
                        <div className="flex flex-wrap gap-2 justify-center">
                            <button onClick={handleCopyToClipboard} className="px-3 py-2 rounded-xl text-sm font-bold bg-slate-800 text-white hover:bg-slate-900 transition">📋 コピー</button>
                            <button onClick={handleExport} className="px-3 py-2 text-sm font-bold bg-green-600 text-white rounded-xl hover:bg-green-700 transition">📥 保存</button>
                            <label className="px-3 py-2 text-sm font-bold bg-amber-500 text-white rounded-xl hover:bg-amber-600 transition cursor-pointer">📤 復元
                                <input type="file" accept=".json" onChange={handleImport} className="hidden" />
                            </label>
                        </div>
                    </header>
                    <div className="bg-white p-1.5 rounded-xl shadow-sm border border-blue-100 flex gap-2 mb-6">
                        {['memory', 'stats', 'simulator'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 rounded-lg font-bold text-sm transition ${activeTab === tab ? 'bg-blue-500 text-white' : 'text-slate-500 hover:bg-slate-50'}`}>
                                {tab === 'memory' ? '📖 記録' : tab === 'stats' ? '🏆 実績' : 'ガチャ'}
                            </button>
                        ))}
                    </div>
                    <main className="flex-1">
                        {activeTab === 'memory' && (
                            <div className="space-y-6">
                                <details className="bg-white rounded-2xl shadow-sm border border-blue-100 group" open={!!editingId}>
                                    <summary className="p-6 font-bold text-lg text-slate-800 cursor-pointer list-none flex justify-between items-center select-none">
                                        <h2 className="text-lg font-bold text-slate-800 border-l-4 border-blue-500 pl-2">📝 {editingId ? '記録を編集' : '記録を新規追加'}</h2>
                                        <span className="text-sm text-blue-500 group-open:rotate-180 transition-transform">▼</span>
                                    </summary>
                                    <form onSubmit={handleSaveRecord} className="p-6 pt-0 space-y-5">
                                        <div className="flex gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1">日付</label>
                                                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-28 sm:w-32 border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 focus:outline-none" />
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-xs font-bold text-slate-600 mb-1">PU鯖 *</label>
                                                <input type="text" value={puSaba} onChange={(e) => setPuSaba(e.target.value)} required className="w-full border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 focus:outline-none" />
                                            </div>
                                        </div>
                                        <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100/50">
                                            <label className="block text-xs font-bold text-slate-700 mb-2">計算用</label>
                                            <div className="flex flex-col gap-3">
                                                <div className="flex items-center gap-4">
                                                    <div className="flex items-center gap-2"><span className="text-xs text-slate-500">単発:</span><input type="number" value={countA} onChange={(e) => setCountA(e.target.value)} className="w-16 border rounded-lg px-2 py-1 text-center bg-white" /></div>
                                                    <div className="flex items-center gap-2"><span className="text-xs text-slate-500">11連:</span><input type="number" value={countB} onChange={(e) => setCountB(e.target.value)} className="w-16 border rounded-lg px-2 py-1 text-center bg-white" /></div>
                                                </div>
                                                <div className="text-sm font-bold pt-1 border-t border-blue-100/30">合計: <span className="text-xl text-blue-600">{totalCount}</span> 連</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-4 items-center">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1">天井した回数</label>
                                                <select value={tenjo} onChange={(e) => setTenjo(e.target.value)} className="w-20 border border-slate-200 rounded-lg px-2 py-1 bg-slate-50 text-sm">
                                                    {[0, 1, 2, 3, 4, 5].map(num => (<option key={num} value={num}>{num}</option>))}
                                                </select>
                                            </div>
                                            <label className="flex items-center gap-1.5 cursor-pointer mt-5">
                                                <input type="checkbox" checked={isNoFourStarPU} onChange={(e) => setIsNoFourStarPU(e.target.checked)} className="w-5 h-5 rounded border-slate-300" />
                                                <span className="text-sm font-bold text-slate-600 whitespace-nowrap">星4PUなし</span>
                                            </label>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="block text-xs font-bold text-slate-600">ガチャ結果</label>
                                            {shoukanList.map((shoukan, index) => (
                                                <div key={index} className="flex items-center gap-1.5 flex-nowrap mb-2">
                                                    <select value={shoukan.type || '星5PU'} onChange={(e) => updateShoukanSaba(index, 'type', e.target.value)} className="border border-slate-200 rounded-lg px-1 py-1 bg-white text-sm shrink-0">
                                                        <option value="星5PU">星5PU</option>
                                                        <option value="星5他">星5他</option>
                                                        <option value="星4PU">星4PU</option>
                                                        <option value="その他">その他</option>
                                                        <option value="特殊">特殊</option>
                                                    </select>
                                                    <input type="text" placeholder="召喚した鯖名" value={shoukan.name} onChange={(e) => updateShoukanSaba(index, 'name', e.target.value)} className="flex-1 min-w-[80px] border border-slate-200 rounded-lg px-2 py-1.5 bg-white text-sm" />
                                                    <input type="number" value={shoukan.count} onChange={(e) => updateShoukanSaba(index, 'count', e.target.value)} placeholder="1" className="w-10 border border-slate-200 rounded-lg px-1 py-1.5 text-center bg-white text-sm shrink-0" />
                                                    {shoukanList.length > 1 && (
                                                        <button type="button" onClick={() => setShoukanList(shoukanList.filter((_, i) => i !== index))} className="text-rose-500 font-bold px-2 py-1 hover:bg-rose-50 rounded-lg transition shrink-0">✕</button>
                                                    )}
                                                </div>
                                            ))}
                                            <button type="button" onClick={() => setShoukanList([...shoukanList, { name: '', count: '', type: '星5PU' }])} className="text-xs font-bold text-blue-600 mt-2 block">＋ 鯖を追加</button>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1">備考</label>
                                            <textarea value={bikou} onChange={(e) => setBikou(e.target.value)} rows="1" className="w-full border border-slate-200 rounded-xl px-3 py-2 bg-slate-50" />
                                        </div>
                                        <div className="flex gap-2 pt-2">
                                            <button type="submit" className="flex-1 bg-blue-500 text-white font-bold py-3 rounded-xl hover:bg-blue-600">{editingId ? '変更を保存' : '記録する'}</button>
                                            {editingId && <button type="button" onClick={() => setEditingId(null)} className="bg-slate-200 px-4 rounded-xl font-bold">キャンセル</button>}
                                        </div>
                                    </form>
                                </details>
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-blue-100 flex flex-col gap-3">
                                    <input type="text" placeholder="🔍 検索 (PU鯖名・結果・備考)" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full border border-slate-200 rounded-lg px-3 py-2 bg-slate-50" />
                                    <div className="flex items-center gap-4">
                                        <div className="flex-1">
                                            <select value={searchYear} onChange={(e) => setSearchYear(e.target.value)} className="w-full border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 text-sm">
                                                <option value="all">全期間</option>
                                                {availableYears.map(y => <option key={y} value={y}>{y}年</option>)}
                                            </select>
                                        </div>
                                        <label className="flex items-center gap-2 cursor-pointer text-sm text-slate-600 font-bold whitespace-nowrap">
                                            <input type="checkbox" checked={onlyTenjo} onChange={(e) => setOnlyTenjo(e.target.checked)} className="w-4 h-4 rounded border-slate-300" />
                                            天井のみ表示
                                        </label>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-lg font-bold text-slate-800">履歴</h2>
                                    {filteredRecords.map((rec) => (
                                        <div key={rec.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative">
                                            <div className="absolute top-4 right-4 flex gap-2">
                                                <button onClick={() => handleEditClick(rec)} className="px-3 py-1 text-xs font-bold bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100">編集</button>
                                                <button onClick={() => handleDeleteRecord(rec.id)} className="px-3 py-1 text-xs font-bold bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100">削除</button>
                                            </div>
                                            <div className="font-bold text-slate-800">{rec.puSaba} <span className="text-xs text-slate-400 ml-2">{rec.date}</span></div>
                                            <div className="text-xs text-slate-600 mt-2">合計: {rec.totalCount}連 {rec.tenjo ? ` | 天井: ${rec.tenjo}回` : ''} {rec.isNoFourStarPU ? '(星4PUなし)' : ''}</div>
                                            {rec.shoukanList.length > 0 && (
                                                <div className="mt-2 text-sm text-slate-700 flex flex-wrap gap-2">
                                                    {rec.shoukanList.map((s, i) => (
                                                        <span key={i} className="text-xs border px-2 py-1 rounded inline-block">
                                                            {s.type || '不明'} {s.name} ✕ {s.count}
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                            {rec.bikou && <div className="mt-2 text-xs text-slate-500 bg-slate-50 p-2 rounded">{rec.bikou}</div>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'stats' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
                                    <h2 className="text-lg font-bold mb-4 text-center">🏆 実績集計</h2>
                                    <select value={statYear} onChange={(e) => setStatYear(e.target.value)} className="border p-2 rounded-lg mb-4 bg-slate-50 w-full text-center">
                                        <option value="all">全期間</option>
                                        {availableYears.map(y => <option key={y} value={y}>{y}年</option>)}
                                    </select>
                                    <div className="space-y-4">
                                        <div className="p-4 bg-blue-50 rounded-xl text-center">
                                            <h3 className="font-bold text-blue-800 mb-3">{statYear === 'all' ? '期間合計' : `${statYear}年合計`}</h3>
                                            <div className="text-4xl mb-2 font-bold">{stats.count}連</div>
                                            <div className="flex flex-col sm:flex-row sm:justify-center items-center gap-2 sm:gap-6 text-sm">
                                                <div className="font-bold text-emerald-600">星5PU: {stats.breakdown['星5PU']}騎({stats.count > 0 ? ((stats.breakdown['星5PU'] / stats.count) * 100).toFixed(2) : 0}%)</div>
                                                <div className="text-slate-600 font-medium">星5他: {stats.breakdown['星5他']}騎({stats.count > 0 ? ((stats.breakdown['星5他'] / stats.count) * 100).toFixed(2) : 0}%)</div>
                                                <div className="font-bold text-blue-600">星4PU: {stats.breakdown['星4PU']}騎({stats.countForFourStarRate > 0 ? ((stats.breakdown['星4PU'] / stats.countForFourStarRate) * 100).toFixed(2) : 0}%)</div>
                                                <div className="font-bold text-purple-600">特殊: {stats.breakdown['特殊']}騎</div>
                                            </div>
                                            <div className="text-sm font-bold text-slate-700 mt-4 pt-4 border-t text-center">天井: {stats.tenjo}回</div>
                                        </div>
                                        {statYear !== 'all' && (
                                            <div className="border-t pt-4">
                                                <h3 className="font-bold mb-2">月別</h3>
                                                {Object.keys(stats.monthlyData).sort().reverse().map(month => (
                                                    <div key={month} className="flex justify-between py-2 border-b text-sm">
                                                        <span>{month}</span>
                                                        <span>{stats.monthlyData[month].count}連 ({stats.monthlyData[month].count > 0 ? ((stats.monthlyData[month].pickups / stats.monthlyData[month].count) * 100).toFixed(1) : 0}%)</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'simulator' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 text-center space-y-6">
                                <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-xl border border-slate-200 text-left">
                                    <span className="text-sm font-bold text-slate-700">💎所持数：</span>
                                    <input type="number" value={diamonds} onChange={(e) => setDiamonds(e.target.value)} placeholder="0" className="w-24 border border-slate-200 rounded-lg px-2 py-1 text-center font-bold text-slate-800 bg-white" />
                                    <span className="text-xs text-slate-500">個</span>
                                </div>
                                <div className="relative min-h-[240px] bg-gradient-to-b from-blue-50/20 to-indigo-50/40 rounded-2xl border flex flex-col items-center justify-center p-4">
                                    <div className="h-6">
                                        {simPhase === 'animating' && <span className="font-bold text-xs bg-blue-500 text-white px-3 py-1 rounded-full">進行中: {currentStep} / 11 回目</span>}
                                    </div>
                                    <div className="w-full h-32 flex flex-col items-center justify-center relative my-2">
                                        {isRainbowEffect && <div className="absolute w-36 h-36 rounded-full bg-gradient-to-tr from-red-500 via-green-500 to-blue-500 opacity-40 blur-md animate-rainbow" />}
                                        {simPhase === 'animating' && (
                                            <div className="h-24 flex items-center justify-center z-10">
                                                {displayState === 'gift' ? (
                                                    <div className="relative flex items-center justify-center">
                                                        <div className={`text-6xl z-10 ${isWobbling ? 'animate-wobble' : ''}`}>{giftEmoji}</div>
                                                    </div>
                                                ) : (
                                                    <div className="text-7xl animate-jojo">{currentItem?.emoji}</div>
                                                )}
                                            </div>
                                        )}
                                        {simPhase === 'result' && (
                                            <div className="flex flex-wrap justify-center items-center gap-2 w-full max-w-[280px] mx-auto animate-fade-in-group">
                                                {simResults.map((item, i) => (
                                                    <div key={i} className="w-[calc(25%-8px)] bg-white border p-1.5 rounded-lg flex flex-col items-center shadow-sm animate-fade-in-item" style={{ animationDelay: `${0.05 + (i * 0.15)}s` }}>
                                                        <div className="text-xl">{item.emoji}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="space-y-4 flex flex-col items-center">
                                    <button onClick={runSimulator11} disabled={simPhase === 'animating'} className={`px-8 py-3.5 rounded-xl font-bold text-white shadow-md ${simPhase === 'animating' ? 'bg-slate-300' : 'bg-gradient-to-r from-amber-500 to-yellow-500 hover:scale-95 transition'}`}>11回ガチャを回す</button>
                                    {simPhase === 'animating' && (
                                        <button onClick={() => { skipRef.current = true; }} className="px-6 py-2 rounded-full font-bold text-sm bg-slate-700 text-white shadow hover:bg-slate-800 transition">⏩ スキップ</button>
                                    )}
                                    <div className="w-full max-w-md border-t pt-4 mt-2 text-left space-y-3">
                                        <h3 className="text-sm font-bold text-slate-700">📊 ガチャ結果</h3>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 grid grid-cols-5 gap-1 text-center text-[10px]">
                                            <div>
                                                <div className="text-slate-500 mb-0.5 font-medium">合計</div>
                                                <div className="text-sm font-bold text-slate-800">{simTotalCount}<span className="text-[9px] font-normal text-slate-500 ml-0.5">連</span></div>
                                            </div>
                                            <div>
                                                <div className="text-slate-500 mb-0.5 font-medium">🌏 星5PU</div>
                                                <div className="text-sm font-bold text-emerald-600">{simFiveStarPuCount}<span className="text-[9px] font-normal text-slate-500 ml-0.5">騎</span></div>
                                                <div className="text-[9px] text-slate-400">({simTotalCount > 0 ? ((simFiveStarPuCount / simTotalCount) * 100).toFixed(2) : '0.00'}%)</div>
                                            </div>
                                            <div>
                                                <div className="text-slate-500 mb-0.5 font-medium">🌕 星5すり</div>
                                                <div className="text-sm font-bold text-amber-600">{simFiveStarSurinukeCount}<span className="text-[9px] font-normal text-slate-500 ml-0.5">騎</span></div>
                                                <div className="text-[9px] text-slate-400">({simTotalCount > 0 ? ((simFiveStarSurinukeCount / simTotalCount) * 100).toFixed(2) : '0.00'}%)</div>
                                            </div>
                                            <div>
                                                <div className="text-slate-500 mb-0.5 font-medium">🐓 星4PU</div>
                                                <div className="text-sm font-bold text-blue-600">{simFourStarPuCount}<span className="text-[9px] font-normal text-slate-500 ml-0.5">騎</span></div>
                                                <div className="text-[9px] text-slate-400">({simTotalCount > 0 ? ((simFourStarPuCount / simTotalCount) * 100).toFixed(2) : '0.00'}%)</div>
                                            </div>
                                            <div>
                                                <div className="text-slate-500 mb-0.5 font-medium">🐣 星4すり</div>
                                                <div className="text-sm font-bold text-indigo-600">{simFourStarSurinukeCount}<span className="text-[9px] font-normal text-slate-500 ml-0.5">騎</span></div>
                                                <div className="text-[9px] text-slate-400">({simTotalCount > 0 ? ((simFourStarSurinukeCount / simTotalCount) * 100).toFixed(2) : '0.00'}%)</div>
                                            </div>
                                        </div>
                                        <div className="text-center">
                                            <button onClick={() => { setSimTotalCount(0); setSimFiveStarPuCount(0); setSimFiveStarSurinukeCount(0); setSimFourStarPuCount(0); setSimFourStarSurinukeCount(0); }} className="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs rounded-lg transition">🔄 リセット</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<App />));
    </script>
</body>
</html>
